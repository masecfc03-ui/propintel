<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Icon mark -->
  <rect width="40" height="40" rx="10" fill="#2563EB"/>
  <!-- Building silhouette inside lens -->
  <rect x="11" y="20" width="5" height="10" rx="1" fill="white" opacity="0.9"/>
  <rect x="17.5" y="16" width="5" height="14" rx="1" fill="white"/>
  <rect x="24" y="22" width="5" height="8" rx="1" fill="white" opacity="0.7"/>
  <!-- Magnifying glass circle arc -->
  <circle cx="20" cy="19" r="9" stroke="white" stroke-width="1.5" stroke-dasharray="2 1.5" opacity="0.25" fill="none"/>
  <!-- Dot accent -->
  <circle cx="30" cy="10" r="3" fill="#93C5FD"/>

  <!-- Wordmark -->
  <text x="52" y="26" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.5" fill="#0F172A">Prop<tspan fill="#2563EB">Intel</tspan></text>
</svg>
