<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Confirmed — PropIntel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff; --bg: #f8fafc; --border: #e2e8f0;
      --accent: #2563eb; --green: #16a34a; --green-light: #f0fdf4;
      --text: #0f172a; --text2: #475569; --text3: #94a3b8;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 40px;
      max-width: 480px; width: 100%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .check-circle {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--green-light); border: 2px solid rgba(22,163,74,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin: 0 auto 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
    p { font-size: 0.9rem; color: var(--text2); line-height: 1.6; margin-bottom: 8px; }
    .email-note {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; margin: 24px 0;
      font-size: 0.825rem; color: var(--text2); text-align: left;
    }
    .email-note strong { color: var(--text); }
    .btn {
      display: block; background: var(--accent); color: white;
      padding: 13px 24px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; text-decoration: none;
      transition: background 0.15s; margin-top: 8px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn.secondary {
      background: none; color: var(--text2);
      border: 1px solid var(--border); margin-top: 8px;
    }
    .btn.secondary:hover { border-color: var(--text2); background: none; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-circle">✓</div>
    <h1>Payment confirmed</h1>
    <p>Your PropIntel report is being generated.</p>
    <p>This takes about 10–15 seconds.</p>

    <div class="email-note">
      <strong>📧 Check your email</strong><br />
      Your report will be delivered to the email you provided at checkout. If you don't see it within 2 minutes, check your spam folder.
    </div>

    <a id="report-btn" href="report.html" class="btn">
      <span class="spinner"></span>Loading your report...
    </a>
    <a href="index.html" class="btn secondary">← Back to PropIntel</a>
  </div>

  <script>
    // Pass address from localStorage so report.html can load it
    const addr = localStorage.getItem('last_address') || '';
    const params = new URLSearchParams(window.location.search);
    const tier = params.get('tier') || (addr ? 'pro' : 'starter');

    setTimeout(() => {
      const btn = document.getElementById('report-btn');
      btn.innerHTML = '📊 View Your Report →';
      btn.href = `report.html?address=${encodeURIComponent(addr)}&tier=${tier}`;
    }, 4000);
  </script>
</body>
</html>
